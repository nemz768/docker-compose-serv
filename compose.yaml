services:
      db:
        image: mysql:8.0
        environment: 
          MYSQL_ROOT_PASSWORD: db-57xsl
          MYSQL_DATABASE: example
        ports:
          - "3306:3306"
        healthcheck: 
          retries: 5
          interval: 5s
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          timeout: 10s
          
      backend: 
        build: ./backend
        ports: 
          - "8080:8080"
        depends_on:
          db: 
            condition: service_healthy

      frontend: 
        build: ./frontend
        ports: 
          - "3000:3000"